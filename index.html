<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chatbot UASD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="chat-container">
    <div id="messages"></div>

    <!-- Preguntas sugeridas -->
    <div id="suggested-questions">
      <button class="suggestion">¿Cuál es la misión de la UASD?</button>
      <button class="suggestion">¿Qué establece el Estatuto sobre el Rector?</button>
      <button class="suggestion">¿Cuáles son los órganos de gobierno?</button>
      <button class="suggestion">¿Qué dice sobre los estudiantes?</button>
    </div>

    <div id="input-container">
      <input id="input" type="text" placeholder="Escribe tu mensaje...">
      <button id="send">Enviar</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
